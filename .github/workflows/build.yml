name: Build
on:
  push:
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - id: version
        run: |
          # Use exact tag if on one, otherwise previous tag + hash, otherwise v0.0.0 + hash
          if git describe --tags --exact-match --match 'v*' HEAD 2>/dev/null; then
            version=$(git describe --tags --exact-match --match 'v*' HEAD)
          elif git describe --tags --match 'v*' HEAD 2>/dev/null; then
            version=$(git describe --tags --match 'v*' HEAD)
          else
            version="v0.0.0-0-g$(git rev-parse --short HEAD)"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - run: |
          nix --extra-experimental-features nix-command build \
            --show-trace \
            -f source/ci.nix \
            --argstr version "${{ steps.version.outputs.value }}" \
            -o result-docker dockerImage \
            -o result-firefox firefoxExtension \
            ;
      - if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix run nixpkgs#skopeo -- copy \
            --dest-creds="$GITHUB_ACTOR":"$GITHUB_TOKEN" \
            docker-archive:result-docker \
            docker://ghcr.io/andrewbaxter/sunwet:${{ github.ref_name }}${{ case(endsWith(matrix.os, '-arm'), '-arm64', '') }} \
            ;
      - if: ${{ startsWith(github.ref, 'refs/tags/v') && !endsWith(matrix.os, '-arm') }}
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          set -eu -o pipefail

          # Unzip the unsigned extension to a temp dir for web-ext sign
          mkdir -p firefox-unpacked
          unzip result-firefox/sunwet_firefox.zip -d firefox-unpacked

          # Submit to Mozilla Add-ons API and wait for signing
          nix run nixpkgs#web-ext -- sign \
            --channel unlisted \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            --source-dir firefox-unpacked \
            --artifacts-dir web-ext-artifacts \
            --timeout 900000 \
            ;

          # Find the signed XPI and fail if signing didn't produce one
          signed_xpi=$(find web-ext-artifacts -name '*.xpi' | head -1)
          if [ -z "$signed_xpi" ]; then
            echo "ERROR: Signed XPI not found - Mozilla may not have approved the extension"
            exit 1
          fi
          cp "$signed_xpi" sunwet_firefox_${{ github.ref_name }}.xpi
      - if: ${{ startsWith(github.ref, 'refs/tags/v') && !endsWith(matrix.os, '-arm') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes || true
          gh release upload "${{ github.ref_name }}" sunwet_firefox_${{ github.ref_name }}.xpi --clobber
