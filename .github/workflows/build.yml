name: Build
on:
  push:
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: |
          nix --extra-experimental-features nix-command build \
            --show-trace \
            -f source/docker.nix \
            -o image.tar.gz \
            config.system.build.sunwet \
            ;
      - if: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix run nixpkgs#skopeo -- copy \
            --dest-creds="$GITHUB_ACTOR":"$GITHUB_TOKEN" \
            docker-archive:image.tar.gz \
            docker://ghcr.io/andrewbaxter/sunwet:latest${{case(endsWith(matrix.os, '-arm'), '-arm64', '')}} \
            ;
